requirements:
- id: REQ-001
  ac_checkbox: 0
  ac_text: User can list all dogs via GET /api/v1/dogs
  title: User can list all dogs via GET /api/v1/dogs
  type: api_behavior
  contract:
    interface:
      method: GET
      path: /api/v1/dogs
      auth: jwt_bearer
    preconditions:
    - id: PRE-001
      description: Valid JWT bearer token is present
      formal: jwt != null AND jwt.exp > now()
      category: authentication
    - id: PRE-002
      description: Request contains properly formatted Authorization header
      formal: request.headers['Authorization'].startsWith('Bearer ')
      category: authentication
    - id: PRE-003
      description: User referenced in JWT exists in the system
      formal: db.users.exists(jwt.sub) == true
      category: data_existence
    - id: PRE-004
      description: User account is in active state
      formal: db.users.find(jwt.sub).status == 'active'
      category: data_state
    - id: PRE-005
      description: User has authorization to access dog data
      formal: jwt.scope.includes('read:dogs') OR user.permissions.includes('dogs:read')
      category: authorization
    - id: PRE-006
      description: Database connection is available
      formal: db.connection.status == 'healthy'
      category: system_health
    - id: PRE-007
      description: Rate limit for user has not been exceeded
      formal: rate_limiter.check(jwt.sub, 'get_dogs') == allowed
      category: rate_limit
    success:
      status: 200
      content_type: application/json
      schema:
        type: object
        required:
        - dogs
        properties:
          dogs:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                breed:
                  type: string
                  required: true
                age:
                  type: integer
                  required: true
                owner_id:
                  type: string
                  required: true
        forbidden_fields:
        - password
        - password_hash
        - ssn
        - internalId
    failures:
    - id: FAIL-001
      when: No Authorization header provided
      violates: PRE-002
      status: 401
      body:
        error: unauthorized
        message: Authorization header required
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-002
      when: Authorization header does not start with 'Bearer '
      violates: PRE-002
      status: 401
      body:
        error: unauthorized
        message: Bearer token required
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-003
      when: No JWT token provided in Bearer header
      violates: PRE-001
      status: 401
      body:
        error: unauthorized
        message: Bearer token required
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-004
      when: JWT token has expired
      violates: PRE-001
      status: 401
      body:
        error: token_expired
        message: JWT token has expired
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-005
      when: JWT token is malformed
      violates: PRE-001
      status: 401
      body:
        error: invalid_token
        message: Invalid JWT token format
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-006
      when: JWT token has wrong issuer
      violates: PRE-001
      status: 401
      body:
        error: invalid_token
        message: JWT token from invalid issuer
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-007
      when: JWT token has been revoked
      violates: PRE-001
      status: 401
      body:
        error: token_revoked
        message: JWT token has been revoked
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-008
      when: User referenced in JWT never existed
      violates: PRE-003
      status: 404
      body:
        error: not_found
        message: User not found
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-009
      when: User referenced in JWT has been soft-deleted
      violates: PRE-003
      status: 404
      body:
        error: not_found
        message: User not found
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-010
      when: User referenced in JWT has been hard-deleted
      violates: PRE-003
      status: 404
      body:
        error: not_found
        message: User not found
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
