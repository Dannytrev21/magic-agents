        message: Database connection refused
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-021
      when: Per-user rate limit exceeded
      violates: PRE-007
      status: 429
      body:
        error: rate_limit_exceeded
        message: Request rate limit exceeded for user
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    - id: FAIL-022
      when: Global rate limit exceeded
      violates: PRE-007
      status: 429
      body:
        error: rate_limit_exceeded
        message: Global request rate limit exceeded
        timestamp: '2026-03-22T10:00:00Z'
        path: /api/v1/dogs
    invariants:
    - id: INV-001
      type: security
      rule: Never expose password, passwordHash, ssn, or internalId in API responses
      formal: Never expose password, passwordHash, ssn, or internalId in API responses
    - id: INV-002
      type: security
      rule: Never allow cross-tenant data access
      formal: Never allow cross-tenant data access
    - id: INV-003
      type: security
      rule: All PII fields must have X-Data-Classification header
      formal: All PII fields must have X-Data-Classification header
    - id: INV-004
      type: security
      rule: 'Response MUST NOT contain fields: internalId, password, password_hash,
        ssn'
      formal: '''password'' not in response.keys() AND ''password_hash'' not in response.keys()
        AND ''ssn'' not in response.keys() AND ''internalId'' not in response.keys()'
