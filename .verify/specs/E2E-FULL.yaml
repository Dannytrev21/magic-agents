meta:
  spec_version: '1.0'
  jira_key: E2E-FULL
  jira_summary: User Profile Endpoint
  generated_at: '2026-03-22T03:01:56.533852+00:00'
  approved_at: '2026-03-22T03:01:56.533852+00:00'
  approved_by: e2e-test
  status: approved
requirements:
- id: REQ-001
  ac_checkbox: 0
  ac_text: User can view their profile via GET /api/v1/users/me
  title: User can view their profile via GET /api/v1/users/me
  type: api_behavior
  contract:
    interface:
      method: GET
      path: /api/v1/users/me
      auth: jwt_bearer
    preconditions:
    - id: PRE-001
      description: Valid JWT bearer token is present
      formal: jwt != null AND jwt.exp > now()
      category: authentication
    - id: PRE-002
      description: User referenced by JWT exists
      formal: db.users.exists(jwt.sub) == true
      category: data_existence
    - id: PRE-003
      description: User account is active
      formal: db.users.find(jwt.sub).status == 'active'
      category: data_state
    success:
      status: 200
      content_type: application/json
      schema:
        type: object
        required:
        - id
        - email
        - displayName
        properties:
          id:
            type: string
          email:
            type: string
          displayName:
            type: string
        forbidden_fields:
        - password
        - ssn
    failures:
    - id: FAIL-001
      when: No auth token provided
      violates: PRE-001
      status: 401
      body:
        error: unauthorized
        message: Bearer token required
    - id: FAIL-002
      when: Auth token expired
      violates: PRE-001
      status: 401
      body:
        error: unauthorized
        message: Token expired
    - id: FAIL-003
      when: User not found
      violates: PRE-002
      status: 404
      body:
        error: not_found
        message: User not found
    invariants:
    - id: INV-001
      type: security
      rule: 'Response MUST NOT contain fields: password, ssn'
      formal: '''password'' not in response.keys() AND ''ssn'' not in response.keys()'
  verification:
  - refs:
    - success
    - FAIL-001
    - FAIL-002
    - FAIL-003
    - INV-001
    skill: pytest_unit_test
    output: .verify/generated/test_e2e_full.py
traceability:
  ac_mappings:
  - ac_checkbox: 0
    ac_text: User can view their profile via GET /api/v1/users/me
    pass_condition: ALL_PASS
    required_verifications:
    - ref: REQ-001.success
      description: 'Happy path: HTTP 200'
      verification_type: test_result
    - ref: REQ-001.FAIL-001
      description: 'Failure: No auth token provided'
      verification_type: test_result
    - ref: REQ-001.FAIL-002
      description: 'Failure: Auth token expired'
      verification_type: test_result
    - ref: REQ-001.FAIL-003
      description: 'Failure: User not found'
      verification_type: test_result
    - ref: REQ-001.INV-001
      description: 'Invariant: Response MUST NOT contain fields: password, ssn'
      verification_type: test_result
