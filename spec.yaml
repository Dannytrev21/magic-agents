# SPECify Specification Contract
# ═══════════════════════════════════════════════════════════════
# THIS IS THE CANONICAL CONTRACT. Everything upstream produces it.
# Everything downstream consumes it. It is the boundary between
# AI (negotiation) and determinism (execution).
# ═══════════════════════════════════════════════════════════════
#
# Producer: Spec Compiler (from VerificationContext after negotiation)
# Consumers:
#   - Skill Router (reads requirements[].verification)
#   - Skill Agents (reads requirements[].contract)
#   - Evaluator (reads traceability.ac_mappings)
#   - Jira Updater (reads traceability.ac_mappings[].ac_checkbox)
#   - Web UI (reads everything for display)
# Location: .verify/specs/{jira_key}.yaml
# Validated against: .verify/schemas/spec.schema.json

